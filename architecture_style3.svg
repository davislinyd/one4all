<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" width="100%" height="100%">
  <defs>
    <!-- Pattern for dotted grid background -->
    <pattern id="dotGrid" x="0" y="0" width="20" height="20" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1" fill="#cbd5e1" />
    </pattern>

    <!-- Markers -->
    <marker id="arrow-blue" viewBox="0 0 10 10" refX="6" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 1.5 L 8 5 L 0 8.5 z" fill="#1e40af" />
    </marker>
    <marker id="arrow-slate" viewBox="0 0 10 10" refX="6" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 1.5 L 8 5 L 0 8.5 z" fill="#475569" />
    </marker>
  </defs>

  <!-- Canvas Background -->
  <rect width="900" height="500" rx="12" fill="#ffffff" stroke="#cbd5e1" stroke-width="2" />
  
  <!-- Dotted Tech Grid -->
  <rect width="900" height="500" rx="12" fill="url(#dotGrid)" opacity="0.3" />

  <!-- Title Section -->
  <rect x="35" y="25" width="280" height="50" rx="6" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1" />
  <text x="50" y="48" font-family="monospace" font-size="14" font-weight="bold" fill="#0f172a">
    $ one4all --arch-diagram
  </text>
  <text x="50" y="65" font-family="monospace" font-size="10" fill="#64748b">
    風格三：科技藍調單色風 (Mono Blue Tech)
  </text>

  <!-- ==================== LOGICAL FLOW CONNECTIONS ==================== -->

  <!-- Client -> Nginx -->
  <path d="M 190 230 L 290 230" fill="none" stroke="#1e40af" stroke-width="2" marker-end="url(#arrow-blue)" />
  <rect x="202" y="218" width="76" height="18" rx="4" fill="#ffffff" stroke="#94a3b8" stroke-width="1" />
  <text x="240" y="231" font-family="monospace" font-size="9" font-weight="bold" fill="#1e40af" text-anchor="middle">TCP :9005</text>
  
  <!-- Nginx -> video2gif -->
  <path d="M 480 210 C 530 210, 520 125, 570 125" fill="none" stroke="#1e40af" stroke-width="2" marker-end="url(#arrow-blue)" />
  <rect x="490" y="148" width="70" height="18" rx="4" fill="#ffffff" stroke="#94a3b8" stroke-width="1" />
  <text x="525" y="161" font-family="monospace" font-size="9" font-weight="bold" fill="#1e40af" text-anchor="middle">Proxy:9003</text>

  <!-- Nginx -> another_app -->
  <path d="M 480 250 C 530 250, 520 335, 570 335" fill="none" stroke="#1e40af" stroke-width="2" marker-end="url(#arrow-blue)" />
  <rect x="490" y="285" width="70" height="18" rx="4" fill="#ffffff" stroke="#94a3b8" stroke-width="1" />
  <text x="525" y="298" font-family="monospace" font-size="9" font-weight="bold" fill="#1e40af" text-anchor="middle">Proxy:9004</text>

  <!-- Go Supervisor -> Python Apps -->
  <path d="M 480 435 L 790 435 L 790 145 L 760 145" fill="none" stroke="#475569" stroke-width="1.5" stroke-dasharray="4 2" marker-end="url(#arrow-slate)" />
  <path d="M 790 355 L 760 355" fill="none" stroke="#475569" stroke-width="1.5" stroke-dasharray="4 2" marker-end="url(#arrow-slate)" />
  <rect x="745" y="260" width="90" height="20" rx="4" fill="#ffffff" stroke="#cbd5e1" stroke-width="1" />
  <text x="790" y="273" font-family="monospace" font-size="9" font-weight="bold" fill="#475569" text-anchor="middle">PROC_MONITOR</text>

  <!-- Go Supervisor -> Nginx -->
  <path d="M 385 395 L 385 300" fill="none" stroke="#475569" stroke-width="1.5" stroke-dasharray="4 2" marker-end="url(#arrow-slate)" />
  <rect x="335" y="338" width="100" height="20" rx="4" fill="#ffffff" stroke="#cbd5e1" stroke-width="1" />
  <text x="385" y="351" font-family="monospace" font-size="9" font-weight="bold" fill="#475569" text-anchor="middle">CONFIG_RELOAD</text>

  <!-- ==================== TECH SCHEMATIC CARDS ==================== -->

  <!-- Card 1: Client -->
  <g>
    <rect x="40" y="180" width="150" height="100" rx="4" fill="#f8fafc" stroke="#1e40af" stroke-width="2" />
    <line x1="40" y1="210" x2="190" y2="210" stroke="#1e40af" stroke-width="1" />
    <text x="50" y="201" font-family="monospace" font-size="11" font-weight="bold" fill="#1e40af">[CLIENT_APP]</text>
    <text x="55" y="230" font-family="monospace" font-size="9" fill="#0f172a">PROT: HTTP/SSE/WS</text>
    <text x="55" y="248" font-family="monospace" font-size="9" fill="#64748b">DESC: Browser Client</text>
  </g>

  <!-- Card 2: Nginx Gateway -->
  <g>
    <rect x="290" y="180" width="190" height="100" rx="4" fill="#f8fafc" stroke="#1e40af" stroke-width="2" />
    <line x1="290" y1="210" x2="480" y2="210" stroke="#1e40af" stroke-width="1" />
    <text x="300" y="201" font-family="monospace" font-size="11" font-weight="bold" fill="#1e40af">[NGINX_GATEWAY]</text>
    <text x="305" y="230" font-family="monospace" font-size="9" fill="#0f172a">ROLE: REVERSE_PROXY</text>
    <text x="305" y="248" font-family="monospace" font-size="9" fill="#0f172a">BIND: 127.0.0.1:9005</text>
    <text x="305" y="266" font-family="monospace" font-size="8" fill="#64748b">MODE: MAP_UPGRADE_SSE</text>
  </g>

  <!-- Card 3: video2gif Python App -->
  <g>
    <rect x="570" y="80" width="190" height="90" rx="4" fill="#f8fafc" stroke="#1e40af" stroke-width="2" />
    <line x1="570" y1="108" x2="760" y2="108" stroke="#1e40af" stroke-width="1" />
    <text x="580" y="99" font-family="monospace" font-size="11" font-weight="bold" fill="#1e40af">[PYTHON_SVC_1]</text>
    <text x="585" y="126" font-family="monospace" font-size="9" fill="#0f172a">NAME: video2gif</text>
    <text x="585" y="144" font-family="monospace" font-size="9" fill="#0f172a">PORT: 127.0.0.1:9003</text>
  </g>

  <!-- Card 4: another_app Python App -->
  <g>
    <rect x="570" y="290" width="190" height="90" rx="4" fill="#f8fafc" stroke="#1e40af" stroke-width="2" />
    <line x1="570" y1="318" x2="760" y2="318" stroke="#1e40af" stroke-width="1" />
    <text x="580" y="309" font-family="monospace" font-size="11" font-weight="bold" fill="#1e40af">[PYTHON_SVC_2]</text>
    <text x="585" y="336" font-family="monospace" font-size="9" fill="#0f172a">NAME: another_app</text>
    <text x="585" y="354" font-family="monospace" font-size="9" fill="#0f172a">PORT: 127.0.0.1:9004</text>
  </g>

  <!-- Card 5: Go Supervisor -->
  <g>
    <rect x="290" y="395" width="190" height="80" rx="4" fill="#f8fafc" stroke="#475569" stroke-width="2" stroke-dasharray="0" />
    <line x1="290" y1="422" x2="480" y2="422" stroke="#475569" stroke-width="1" />
    <text x="300" y="413" font-family="monospace" font-size="11" font-weight="bold" fill="#475569">[GO_SUPERVISOR]</text>
    <text x="305" y="438" font-family="monospace" font-size="9" fill="#0f172a">CMD : ./one4all run</text>
    <text x="305" y="456" font-family="monospace" font-size="8" fill="#64748b">STAT: DAEMON_MONITOR</text>
  </g>
</svg>
