<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520" width="100%" height="100%">
  <defs>
    <!-- Drop Shadow for Cards -->
    <filter id="flat-shadow" x="-5%" y="-5%" width="110%" height="115%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#0f172a" flood-opacity="0.08" />
    </filter>
    
    <!-- Markers for arrows -->
    <marker id="arrow" viewBox="0 0 10 10" refX="6" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 1.5 L 8 5 L 0 8.5 z" fill="#64748b" />
    </marker>
    <marker id="arrow-blue" viewBox="0 0 10 10" refX="6" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 1.5 L 8 5 L 0 8.5 z" fill="#2563eb" />
    </marker>
    <marker id="arrow-green" viewBox="0 0 10 10" refX="6" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 1.5 L 8 5 L 0 8.5 z" fill="#16a34a" />
    </marker>
  </defs>

  <!-- White Background -->
  <rect width="900" height="520" rx="16" fill="#ffffff" stroke="#e2e8f0" stroke-width="1" />

  <!-- Title -->
  <text x="40" y="45" font-family="system-ui, -apple-system, sans-serif" font-size="22" font-weight="800" fill="#0f172a" letter-spacing="0.5">
    ONE FOR ALL ── GATEWAY ARCHITECTURE
  </text>

  <!-- ==================== LINES & LABELS (WITH BG TO AVOID OVERLAP) ==================== -->

  <!-- Client -> Nginx Server 1 (Port 443) -->
  <path d="M 190 215 C 240 215, 240 150, 290 150" fill="none" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)" />
  <rect x="207" y="160" width="66" height="18" rx="4" fill="#ffffff" stroke="#e2e8f0" stroke-width="1" />
  <text x="240" y="172" font-family="monospace" font-size="9" font-weight="bold" fill="#475569" text-anchor="middle">Port 443</text>

  <!-- Client -> Nginx Server 2 (Port 9002) -->
  <path d="M 190 245 C 240 245, 240 305, 290 305" fill="none" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)" />
  <rect x="207" y="270" width="66" height="18" rx="4" fill="#ffffff" stroke="#e2e8f0" stroke-width="1" />
  <text x="240" y="282" font-family="monospace" font-size="9" font-weight="bold" fill="#475569" text-anchor="middle">Port 9002</text>
  
  <!-- Nginx Server 1 -> service1 -->
  <path d="M 480 150 L 570 150" fill="none" stroke="#16a34a" stroke-width="2" marker-end="url(#arrow-green)" />
  <rect x="495" y="138" width="65" height="18" rx="4" fill="#ffffff" />
  <text x="527" y="151" font-family="monospace" font-size="9" font-weight="bold" fill="#16a34a" text-anchor="middle">Direct /</text>

  <!-- Nginx Server 2 -> video2gif -->
  <path d="M 480 305 C 530 305, 520 250, 570 250" fill="none" stroke="#16a34a" stroke-width="2" marker-end="url(#arrow-green)" />
  <rect x="495" y="265" width="65" height="18" rx="4" fill="#ffffff" />
  <text x="527" y="278" font-family="monospace" font-size="9" font-weight="bold" fill="#16a34a" text-anchor="middle">/video2gif/</text>

  <!-- Nginx Server 2 -> another_app -->
  <path d="M 480 305 C 530 305, 520 370, 570 370" fill="none" stroke="#16a34a" stroke-width="2" marker-end="url(#arrow-green)" />
  <rect x="495" y="340" width="65" height="18" rx="4" fill="#ffffff" />
  <text x="527" y="353" font-family="monospace" font-size="9" font-weight="bold" fill="#16a34a" text-anchor="middle">/another_app/</text>

  <!-- Go Supervisor -> Python Apps (Monitoring) -->
  <path d="M 480 440 L 800 440 L 800 120 L 760 120" fill="none" stroke="#2563eb" stroke-width="1.5" stroke-dasharray="4 4" marker-end="url(#arrow-blue)" />
  <path d="M 800 230 L 760 230" fill="none" stroke="#2563eb" stroke-width="1.5" stroke-dasharray="4 4" marker-end="url(#arrow-blue)" />
  <path d="M 800 350 L 760 350" fill="none" stroke="#2563eb" stroke-width="1.5" stroke-dasharray="4 4" marker-end="url(#arrow-blue)" />
  <rect x="760" y="275" width="80" height="24" rx="4" fill="#ffffff" stroke="#cbd5e1" stroke-width="1" />
  <text x="800" y="290" font-family="system-ui, -apple-system, sans-serif" font-size="9" font-weight="bold" fill="#2563eb" text-anchor="middle">Monitor &amp; Logs</text>

  <!-- Go Supervisor -> Nginx Server 2 (Configure & Reload) -->
  <path d="M 385 400 L 385 350" fill="none" stroke="#2563eb" stroke-width="1.5" stroke-dasharray="4 4" marker-end="url(#arrow-blue)" />
  <rect x="335" y="365" width="100" height="18" rx="4" fill="#ffffff" stroke="#cbd5e1" stroke-width="1" />
  <text x="385" y="377" font-family="system-ui, -apple-system, sans-serif" font-size="9" font-weight="bold" fill="#2563eb" text-anchor="middle">Config &amp; Reload</text>


  <!-- ==================== CARDS ==================== -->

  <!-- Card 1: Client -->
  <g filter="url(#flat-shadow)">
    <rect x="40" y="180" width="150" height="100" rx="8" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1" />
    <rect x="40" y="180" width="150" height="6" rx="2" fill="#3b82f6" />
    <text x="115" y="215" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="700" fill="#0f172a" text-anchor="middle">Client App</text>
    <text x="115" y="238" font-family="monospace" font-size="10" fill="#475569" text-anchor="middle">HTTP / SSE / WS</text>
    <text x="115" y="258" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#94a3b8" text-anchor="middle">Browser or MCP client</text>
  </g>

  <!-- Card 2: Nginx Server 1 (Port 443) -->
  <g filter="url(#flat-shadow)">
    <rect x="290" y="110" width="190" height="80" rx="8" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1" />
    <rect x="290" y="110" width="190" height="6" rx="2" fill="#10b981" />
    <text x="385" y="142" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="700" fill="#0f172a" text-anchor="middle">Nginx Server 1</text>
    <text x="385" y="162" font-family="monospace" font-size="10" fill="#0f766e" text-anchor="middle">Port 443 (Fixed)</text>
  </g>

  <!-- Card 3: Nginx Server 2 (Port 9002) -->
  <g filter="url(#flat-shadow)">
    <rect x="290" y="260" width="190" height="90" rx="8" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1" />
    <rect x="290" y="260" width="190" height="6" rx="2" fill="#10b981" />
    <text x="385" y="292" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="700" fill="#0f172a" text-anchor="middle">Nginx Server 2</text>
    <text x="385" y="312" font-family="monospace" font-size="10" fill="#0f766e" text-anchor="middle">Port 9002 (Dynamic)</text>
    <text x="385" y="330" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#94a3b8" text-anchor="middle">Path routing分流</text>
  </g>

  <!-- Card 4: service1 Python App -->
  <g filter="url(#flat-shadow)">
    <rect x="570" y="105" width="190" height="80" rx="8" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1" />
    <rect x="570" y="105" width="190" height="6" rx="2" fill="#f59e0b" />
    <text x="665" y="137" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="700" fill="#0f172a" text-anchor="middle">service1 App</text>
    <text x="665" y="157" font-family="monospace" font-size="10" fill="#b45309" text-anchor="middle">Port 8080 (HTTP)</text>
  </g>

  <!-- Card 5: video2gif Python App -->
  <g filter="url(#flat-shadow)">
    <rect x="570" y="210" width="190" height="80" rx="8" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1" />
    <rect x="570" y="210" width="190" height="6" rx="2" fill="#f59e0b" />
    <text x="665" y="242" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="700" fill="#0f172a" text-anchor="middle">video2gif App</text>
    <text x="665" y="262" font-family="monospace" font-size="10" fill="#b45309" text-anchor="middle">Port 9003 (HTTP/SSE)</text>
  </g>

  <!-- Card 6: another_app Python App -->
  <g filter="url(#flat-shadow)">
    <rect x="570" y="325" width="190" height="80" rx="8" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1" />
    <rect x="570" y="325" width="190" height="6" rx="2" fill="#f59e0b" />
    <text x="665" y="357" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="700" fill="#0f172a" text-anchor="middle">another_app App</text>
    <text x="665" y="377" font-family="monospace" font-size="10" fill="#b45309" text-anchor="middle">Port 9004 (HTTP/WS)</text>
  </g>

  <!-- Card 7: Go Supervisor -->
  <g filter="url(#flat-shadow)">
    <rect x="290" y="400" width="190" height="80" rx="8" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1" />
    <rect x="290" y="400" width="190" height="6" rx="2" fill="#06b6d4" />
    <text x="385" y="433" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="700" fill="#0f172a" text-anchor="middle">Go Supervisor</text>
    <text x="385" y="453" font-family="monospace" font-size="10" fill="#0891b2" text-anchor="middle">./one4all (Daemon)</text>
  </g>
</svg>
