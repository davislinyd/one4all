<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" width="100%" height="100%">
  <defs>
    <!-- Drop Shadow for Cards -->
    <filter id="flat-shadow" x="-5%" y="-5%" width="110%" height="115%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#0f172a" flood-opacity="0.08" />
    </filter>
    
    <!-- Markers for arrows -->
    <marker id="arrow" viewBox="0 0 10 10" refX="6" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 1.5 L 8 5 L 0 8.5 z" fill="#64748b" />
    </marker>
    <marker id="arrow-blue" viewBox="0 0 10 10" refX="6" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 1.5 L 8 5 L 0 8.5 z" fill="#2563eb" />
    </marker>
    <marker id="arrow-green" viewBox="0 0 10 10" refX="6" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 1.5 L 8 5 L 0 8.5 z" fill="#16a34a" />
    </marker>
  </defs>

  <!-- White Background -->
  <rect width="900" height="500" rx="16" fill="#ffffff" stroke="#e2e8f0" stroke-width="1" />

  <!-- Title -->
  <text x="40" y="55" font-family="system-ui, -apple-system, sans-serif" font-size="22" font-weight="800" fill="#0f172a" letter-spacing="0.5">
    ONE FOR ALL ── GATEWAY ARCHITECTURE
  </text>


  <!-- ==================== LINES & LABELS (WITH BG TO AVOID OVERLAP) ==================== -->

  <!-- Client -> Nginx -->
  <path d="M 190 230 L 290 230" fill="none" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)" />
  <rect x="207" y="218" width="66" height="18" rx="4" fill="#ffffff" />
  <text x="240" y="231" font-family="monospace" font-size="10" font-weight="bold" fill="#475569" text-anchor="middle">Port 9005</text>
  
  <!-- Nginx -> video2gif -->
  <path d="M 480 210 C 530 210, 520 125, 570 125" fill="none" stroke="#16a34a" stroke-width="2" marker-end="url(#arrow-green)" />
  <rect x="490" y="150" width="70" height="18" rx="4" fill="#ffffff" />
  <text x="525" y="163" font-family="monospace" font-size="9" font-weight="bold" fill="#16a34a" text-anchor="middle">/video2gif/</text>

  <!-- Nginx -> another_app -->
  <path d="M 480 250 C 530 250, 520 335, 570 335" fill="none" stroke="#16a34a" stroke-width="2" marker-end="url(#arrow-green)" />
  <rect x="490" y="285" width="70" height="18" rx="4" fill="#ffffff" />
  <text x="525" y="298" font-family="monospace" font-size="9" font-weight="bold" fill="#16a34a" text-anchor="middle">/another_app/</text>

  <!-- Go Supervisor -> Python Apps (Monitoring) -->
  <path d="M 480 435 L 790 435 L 790 145 L 760 145" fill="none" stroke="#2563eb" stroke-width="1.5" stroke-dasharray="4 4" marker-end="url(#arrow-blue)" />
  <path d="M 790 355 L 760 355" fill="none" stroke="#2563eb" stroke-width="1.5" stroke-dasharray="4 4" marker-end="url(#arrow-blue)" />
  <rect x="755" y="260" width="70" height="24" rx="4" fill="#ffffff" stroke="#e2e8f0" stroke-width="1" />
  <text x="790" y="276" font-family="system-ui, -apple-system, sans-serif" font-size="9" font-weight="bold" fill="#2563eb" text-anchor="middle">Process Monitor</text>

  <!-- Go Supervisor -> Nginx (Configure & Reload) -->
  <path d="M 385 395 L 385 300" fill="none" stroke="#2563eb" stroke-width="1.5" stroke-dasharray="4 4" marker-end="url(#arrow-blue)" />
  <rect x="330" y="338" width="110" height="18" rx="4" fill="#ffffff" stroke="#e2e8f0" stroke-width="1" />
  <text x="385" y="351" font-family="system-ui, -apple-system, sans-serif" font-size="9" font-weight="bold" fill="#2563eb" text-anchor="middle">Dynamic Config &amp; Reload</text>


  <!-- ==================== CARDS ==================== -->

  <!-- Card 1: Client -->
  <g filter="url(#flat-shadow)">
    <rect x="40" y="180" width="150" height="100" rx="8" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1" />
    <rect x="40" y="180" width="150" height="6" rx="2" fill="#3b82f6" />
    <text x="115" y="215" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="700" fill="#0f172a" text-anchor="middle">Client App</text>
    <text x="115" y="238" font-family="monospace" font-size="10" fill="#475569" text-anchor="middle">HTTP / SSE / WS</text>
    <text x="115" y="258" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#94a3b8" text-anchor="middle">Browser or MCP client</text>
  </g>

  <!-- Card 2: Nginx Gateway -->
  <g filter="url(#flat-shadow)">
    <rect x="290" y="180" width="190" height="100" rx="8" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1" />
    <rect x="290" y="180" width="190" height="6" rx="2" fill="#10b981" />
    <text x="385" y="215" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="700" fill="#0f172a" text-anchor="middle">Nginx Gateway</text>
    <text x="385" y="238" font-family="monospace" font-size="10" fill="#0f766e" text-anchor="middle">Reverse Proxy (Port 9005)</text>
    <text x="385" y="258" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#94a3b8" text-anchor="middle">Config template dynamic binding</text>
  </g>

  <!-- Card 3: video2gif Python App -->
  <g filter="url(#flat-shadow)">
    <rect x="570" y="80" width="190" height="90" rx="8" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1" />
    <rect x="570" y="80" width="190" height="6" rx="2" fill="#f59e0b" />
    <text x="665" y="115" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="700" fill="#0f172a" text-anchor="middle">video2gif App</text>
    <text x="665" y="135" font-family="monospace" font-size="10" fill="#b45309" text-anchor="middle">Port 9003 (HTTP/SSE)</text>
    <text x="665" y="152" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#94a3b8" text-anchor="middle">Python Simulated Service</text>
  </g>

  <!-- Card 4: another_app Python App -->
  <g filter="url(#flat-shadow)">
    <rect x="570" y="290" width="190" height="90" rx="8" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1" />
    <rect x="570" y="290" width="190" height="6" rx="2" fill="#f59e0b" />
    <text x="665" y="325" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="700" fill="#0f172a" text-anchor="middle">another_app App</text>
    <text x="665" y="345" font-family="monospace" font-size="10" fill="#b45309" text-anchor="middle">Port 9004 (HTTP/WS)</text>
    <text x="665" y="362" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#94a3b8" text-anchor="middle">Python Simulated Service</text>
  </g>

  <!-- Card 5: Go Supervisor -->
  <g filter="url(#flat-shadow)">
    <rect x="290" y="395" width="190" height="80" rx="8" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1" />
    <rect x="290" y="395" width="190" height="6" rx="2" fill="#06b6d4" />
    <text x="385" y="428" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="700" fill="#0f172a" text-anchor="middle">Go Supervisor</text>
    <text x="385" y="448" font-family="monospace" font-size="10" fill="#0891b2" text-anchor="middle">./one4all (Daemon)</text>
  </g>
</svg>
