<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 500" width="100%" height="100%">
  <!-- Definitions for Gradients, Shadows, and Markers -->
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0b0f19" />
      <stop offset="100%" stop-color="#111827" />
    </linearGradient>

    <!-- Client Card Gradient -->
    <linearGradient id="clientGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3b82f6" />
      <stop offset="100%" stop-color="#1d4ed8" />
    </linearGradient>

    <!-- Nginx Card Gradient -->
    <linearGradient id="nginxGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#10b981" />
      <stop offset="100%" stop-color="#047857" />
    </linearGradient>

    <!-- Python Card Gradient -->
    <linearGradient id="pythonGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f59e0b" />
      <stop offset="100%" stop-color="#d97706" />
    </linearGradient>

    <!-- Go Card Gradient -->
    <linearGradient id="goGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#06b6d4" />
      <stop offset="100%" stop-color="#0891b2" />
    </linearGradient>

    <!-- Drop Shadow Filter -->
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#000000" flood-opacity="0.5" />
    </filter>

    <!-- Glow Filter for Active Paths -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>

    <!-- Arrow Marker Definition -->
    <marker id="arrow" viewBox="0 0 10 10" refX="6" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 1.5 L 8 5 L 0 8.5 z" fill="#94a3b8" />
    </marker>
    
    <marker id="arrow-green" viewBox="0 0 10 10" refX="6" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 1.5 L 8 5 L 0 8.5 z" fill="#34d399" />
    </marker>

    <marker id="arrow-cyan" viewBox="0 0 10 10" refX="6" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 1.5 L 8 5 L 0 8.5 z" fill="#22d3ee" />
    </marker>
  </defs>

  <!-- Canvas Background -->
  <rect width="880" height="500" rx="16" fill="url(#bgGrad)" />
  
  <!-- Subtle Grid Lines for Tech Aesthetic -->
  <path d="M 0 100 L 880 100 M 0 200 L 880 200 M 0 300 L 880 300 M 0 400 L 880 400 M 100 0 L 100 500 M 200 0 L 200 500 M 300 0 L 300 500 M 400 0 L 400 500 M 500 0 L 500 500 M 600 0 L 600 500 M 700 0 L 700 500 M 800 0 L 800 500" stroke="#1e293b" stroke-width="0.5" stroke-dasharray="4 8" />

  <!-- Title -->
  <text x="40" y="45" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="800" fill="#f8fafc" letter-spacing="0.5">
    ONE FOR ALL ── GATEWAY ARCHITECTURE
  </text>

  <!-- ==================== CONNECTING LINES ==================== -->

  <!-- Flow: Client -> Nginx -->
  <path d="M 190 250 L 290 250" fill="none" stroke="#94a3b8" stroke-width="2.5" marker-end="url(#arrow)" />
  <text x="210" y="235" font-family="monospace" font-size="11" fill="#94a3b8" text-anchor="middle">Port 9005</text>
  
  <!-- Flow: Nginx -> video2gif -->
  <path d="M 480 230 C 530 230, 520 135, 570 135" fill="none" stroke="#34d399" stroke-width="2.5" filter="url(#glow)" marker-end="url(#arrow-green)" />
  <text x="525" y="165" font-family="monospace" font-size="11" fill="#34d399" text-anchor="middle">/video2gif/ ➜ 9003</text>

  <!-- Flow: Nginx -> another_app -->
  <path d="M 480 270 C 530 270, 520 365, 570 365" fill="none" stroke="#34d399" stroke-width="2.5" filter="url(#glow)" marker-end="url(#arrow-green)" />
  <text x="525" y="315" font-family="monospace" font-size="11" fill="#34d399" text-anchor="middle">/another_app/ ➜ 9004</text>

  <!-- Control Flow: Go Supervisor -> Python Apps (Monitoring) -->
  <path d="M 480 435 L 790 435 L 790 205 L 760 205" fill="none" stroke="#22d3ee" stroke-width="1.5" stroke-dasharray="5 5" marker-end="url(#arrow-cyan)" />
  <path d="M 790 355 L 760 355" fill="none" stroke="#22d3ee" stroke-width="1.5" stroke-dasharray="5 5" marker-end="url(#arrow-cyan)" />
  <text x="795" y="270" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#22d3ee" font-weight="600" writing-mode="tb" text-anchor="middle">
    Auto Restart / Logs
  </text>

  <!-- Control Flow: Go Supervisor -> Nginx (Configure & Reload) -->
  <path d="M 385 395 L 385 300" fill="none" stroke="#22d3ee" stroke-width="1.5" stroke-dasharray="5 5" marker-end="url(#arrow-cyan)" />
  <text x="375" y="350" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#22d3ee" font-weight="600" text-anchor="end">
    Write &amp; Reload Conf
  </text>


  <!-- ==================== NODES (CARDS) ==================== -->

  <!-- Node: Client / Browser -->
  <g filter="url(#shadow)">
    <rect x="40" y="200" width="150" height="100" rx="12" fill="url(#clientGrad)" stroke="#60a5fa" stroke-width="1.5" />
    <text x="115" y="240" font-family="system-ui, -apple-system, sans-serif" font-size="15" font-weight="800" fill="#ffffff" text-anchor="middle">Client App</text>
    <text x="115" y="260" font-family="monospace" font-size="11" fill="#bfdbfe" text-anchor="middle">HTTP / SSE / WS</text>
    <text x="115" y="280" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#93c5fd" text-anchor="middle">Browser / MCP Client</text>
  </g>

  <!-- Node: Nginx Gateway -->
  <g filter="url(#shadow)">
    <rect x="290" y="200" width="190" height="100" rx="12" fill="url(#nginxGrad)" stroke="#34d399" stroke-width="1.5" />
    <!-- Mini Logo Accent -->
    <rect x="305" y="215" width="24" height="24" rx="6" fill="#047857" />
    <text x="317" y="231" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="900" fill="#34d399" text-anchor="middle">N</text>
    
    <text x="385" y="240" font-family="system-ui, -apple-system, sans-serif" font-size="15" font-weight="800" fill="#ffffff" text-anchor="middle">Nginx Gateway</text>
    <text x="385" y="262" font-family="monospace" font-size="12" fill="#a7f3d0" text-anchor="middle">Reverse Proxy</text>
    <text x="385" y="282" font-family="monospace" font-size="10" fill="#34d399" font-weight="bold" text-anchor="middle">Dynamic Config Mode</text>
  </g>

  <!-- Node: Python App 1 (video2gif) -->
  <g filter="url(#shadow)">
    <rect x="570" y="90" width="190" height="90" rx="12" fill="url(#pythonGrad)" stroke="#fbbf24" stroke-width="1.5" />
    <!-- Port Badge -->
    <rect x="700" y="102" width="50" height="18" rx="9" fill="#92400e" />
    <text x="725" y="115" font-family="monospace" font-size="10" font-weight="bold" fill="#fef08a" text-anchor="middle">9003</text>
    
    <text x="665" y="130" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="800" fill="#ffffff" text-anchor="middle">video2gif App</text>
    <text x="665" y="150" font-family="monospace" font-size="11" fill="#fde68a" text-anchor="middle">HTTP &amp; SSE Stream</text>
    <text x="665" y="166" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#f59e0b" text-anchor="middle">Python Simulated Service</text>
  </g>

  <!-- Node: Python App 2 (another_app) -->
  <g filter="url(#shadow)">
    <rect x="570" y="320" width="190" height="90" rx="12" fill="url(#pythonGrad)" stroke="#fbbf24" stroke-width="1.5" />
    <!-- Port Badge -->
    <rect x="700" y="332" width="50" height="18" rx="9" fill="#92400e" />
    <text x="725" y="345" font-family="monospace" font-size="10" font-weight="bold" fill="#fef08a" text-anchor="middle">9004</text>
    
    <text x="665" y="360" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="800" fill="#ffffff" text-anchor="middle">another_app</text>
    <text x="665" y="380" font-family="monospace" font-size="11" fill="#fde68a" text-anchor="middle">HTTP &amp; WS Server</text>
    <text x="665" y="396" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#f59e0b" text-anchor="middle">Python Simulated Service</text>
  </g>

  <!-- Node: Go Supervisor -->
  <g filter="url(#shadow)">
    <rect x="290" y="395" width="190" height="80" rx="12" fill="url(#goGrad)" stroke="#22d3ee" stroke-width="1.5" />
    <!-- Go Accent Icon -->
    <rect x="305" y="407" width="24" height="24" rx="6" fill="#0891b2" />
    <text x="317" y="424" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="900" fill="#22d3ee" text-anchor="middle">Go</text>

    <text x="385" y="430" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="800" fill="#ffffff" text-anchor="middle">Go Supervisor</text>
    <text x="385" y="450" font-family="monospace" font-size="11" fill="#cffafe" text-anchor="middle">./one4all (Daemon)</text>
    <text x="385" y="465" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#06b6d4" text-anchor="middle">Native Process Guard</text>
  </g>
</svg>
