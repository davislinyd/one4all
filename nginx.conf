# One for All - Nginx Reverse Proxy Configuration
# 支援多 Port 暴露與不同代理路由機制

# 動態處理 WebSocket Upgrade，並與 SSE / HTTP Keep-Alive 相容
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      '';
}

# ==================== SERVER BLOCK 1 (Port 443) ====================
# 對外暴露 443 埠，直接代理至 service1 的 8080 埠 (無 Path 分流)
server {
    listen 443;
    server_name localhost;

    location / {
        proxy_pass http://127.0.0.1:8080/;
        
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # 長連線與非緩衝優化
        proxy_buffering off;
        proxy_cache off;
        chunked_transfer_encoding on;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
        tcp_nodelay on;
    }
}

# ==================== SERVER BLOCK 2 (Port 9002) ====================
# 對外暴露 9002 埠 (由 one4all.json 動態綁定)，透過 Path 分流至不同服務
server {
    listen 9002; # DYNAMIC_PORT
    server_name localhost;

    # 1. 代理 video2gif 服務整個路由 (包括網頁、SSE 與 WebSocket)
    location /video2gif/ {
        proxy_pass http://127.0.0.1:9003/;
        
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        proxy_buffering off;
        proxy_cache off;
        chunked_transfer_encoding on;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
        tcp_nodelay on;
    }

    # 2. 代理 another_app 服務整個路由 (包括網頁、SSE 與 WebSocket)
    location /another_app/ {
        proxy_pass http://127.0.0.1:9004/;
        
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        proxy_buffering off;
        proxy_cache off;
        chunked_transfer_encoding on;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
        tcp_nodelay on;
    }

    # 3. 代理傳統 API POST /convert
    location /convert {
        proxy_pass http://127.0.0.1:9003/convert;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        client_max_body_size 50M;
    }
}
