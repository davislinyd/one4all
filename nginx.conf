# One for All - Nginx Reverse Proxy Configuration
# 支援 HTTP, SSE 與 WebSocket MCP 協定

# 動態處理 WebSocket Upgrade，並與 SSE / HTTP Keep-Alive 相容
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      '';
}

server {
    listen 9002;
    
    # 測試時使用 localhost，實際上線時請替換為您的網域 (例如 one4all.example.com)
    server_name localhost;

    # 1. 代理 video2gif 服務整個路由 (包括網頁、SSE 與 WebSocket)
    location /video2gif/ {
        proxy_pass http://127.0.0.1:9003/;
        
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # 停用 Nginx 緩衝，確保 SSE 串流與 WebSocket 即時傳輸
        proxy_buffering off;
        proxy_cache off;
        chunked_transfer_encoding on;
        
        # 延長超時時間以支援長連線 (24小時)
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
        
        # 停用 TCP 延遲以提高即時性
        tcp_nodelay on;
    }

    # 2. 代理 another_app 服務整個路由 (包括網頁、SSE 與 WebSocket)
    location /another_app/ {
        proxy_pass http://127.0.0.1:9004/;
        
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # 停用 Nginx 緩衝，確保 SSE 串流與 WebSocket 即時傳輸
        proxy_buffering off;
        proxy_cache off;
        chunked_transfer_encoding on;
        
        # 延長超時時間以支援長連線 (24小時)
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
        
        # 停用 TCP 延遲以提高即時性
        tcp_nodelay on;
    }

    # 3. 代理傳統 API POST /convert
    location /convert {
        proxy_pass http://127.0.0.1:9003/convert;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        client_max_body_size 50M;
    }
}
